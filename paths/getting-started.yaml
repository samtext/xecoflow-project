get:
  summary: XecoFlow Integration Guide
  tags: [Guides]
  description: |
    ## Welcome to XecoFlow
    XecoFlow is a high-performance API gateway designed to simplify M-Pesa integrations for Kenyan developers.
    
    ### 1. Core Terminologies
    * **Xeco Sentinel:** Our security layer that handles OAuth 2.0 authentication.
    * **STK Push (Lipa Na M-Pesa):** Instant payment prompts sent to a user's phone.
    * **Callback URL:** The "Webhook" on your server where XecoFlow sends payment results.
    
    ### 2. Testing on Localhost
    Since M-Pesa needs to "talk" to your computer, you must use a tunneling service.
    * **Ngrok:** `ngrok http 5000`
    * **LocalTunnel:** `lt --port 5000`
    
    ### 3. Security Credentials
    To generate your `SecurityCredential` for B2C or Reversals:
    1.  Get the **Xeco Public Key** (provided in your dashboard).
    2.  Encrypt your **Initiator Password** using the RSA algorithm with PKCS#1.5 padding.
    3.  Base64 encode the result.
    
    ### 4. IP Whitelisting
    Ensure your server accepts traffic from these XecoFlow Gateway IPs:
    * `196.201.214.200`
    * `196.201.214.206`
    * *(Include other Safaricom IPs here)*
    
    ### 5. Asynchronous Logic
    XecoFlow is **Asynchronous**. 
    * **Step 1:** You send a request to XecoFlow.
    * **Step 2:** We send back an `CheckoutID` immediately.
    * **Step 3:** Once the user enters their PIN, we POST the result to your **CallbackURL**.
  responses:
    '200':
      description: Guide loaded successfully.