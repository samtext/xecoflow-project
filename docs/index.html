<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XecoFlow | Developer Portal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  
  <style>
    :root {
      --xeco-green: #10b981;
      --xeco-dark: #0f172a;
      --border-light: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
      color: var(--xeco-dark);
    }

    .nav {
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
    }

    .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
    .logo span { color: var(--xeco-green); }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: #f9fafb;
    }

    .hero h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 800; }
    .hero h1 span { color: var(--xeco-green); }
    .hero p { color: #4b5563; font-size: 1.2rem; margin-bottom: 40px; }

    .container { max-width: 800px; margin: 0 auto 100px auto; padding: 0 20px; }
    
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border-light);
      transition: all 0.3s ease;
      cursor: pointer;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      border-color: var(--xeco-green);
    }

    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #ecfdf5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      font-size: 2rem;
    }

    .badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    #docs-view { display: none; background: white; min-height: 100vh; }
    .back-nav { padding: 15px 40px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 20px; }
    .back-btn { padding: 8px 16px; cursor: pointer; border: none; background: #111827; color: white; border-radius: 6px; font-weight: 600; }
  </style>
</head>
<body>

  <div id="main-portal">
    <nav class="nav">
      <div class="logo">XECO<span>FLOW</span></div>
      <span class="badge">v1.0.0 Stable</span>
    </nav>

    <section class="hero">
      <h1>Documentation <span>Hub</span></h1>
      <p>Configure your environment and master the Xeco Sentinel security protocol.</p>
    </section>

    <div class="container">
      <div class="card" onclick="openDocs('Guides')">
        <div class="icon-circle">📖</div>
        <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Full Integration Guide</h2>
        <p style="color: #6b7280; margin-bottom: 30px;">Includes Signature Generation (HMAC-SHA256), IP Whitelisting, and STK Push implementation.</p>
        <span class="badge">Start Integrating</span>
      </div>
    </div>
  </div>

  <div id="docs-view">
    <div class="back-nav">
      <button class="back-btn" onclick="closeDocs()">← Back</button>
      <span style="font-weight: 700;">XecoFlow Technical Manual</span>
    </div>
    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
  <script>
    function openDocs(filterTag) {
      document.getElementById('main-portal').style.display = 'none';
      document.getElementById('docs-view').style.display = 'block';
      window.scrollTo(0, 0);

      window.ui = SwaggerUIBundle({
        url: 'openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        filter: filterTag,
        presets: [
          SwaggerUIBundle.presets.apis, 
          SwaggerUIStandalonePreset
        ],
        plugins: [
          function() {
            return {
              components: {
                InfoContainer: () => null,    // Hides the Title/Version header
                SchemesContainer: () => null // Hides the Server Selector
              }
            }
          }
        ],
        layout: "BaseLayout",
        defaultModelsExpandDepth: -1,
      });
    }

    function closeDocs() {
      document.getElementById('main-portal').style.display = 'block';
      document.getElementById('docs-view').style.display = 'none';
    }
  </script>
</body>
</html>
