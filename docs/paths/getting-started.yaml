    Learn how to set up and integrate XecoFlow APIs into your application and start accepting M-Pesa payments today.

    ---

    ### Introduction
    Welcome to XecoFlow APIs. We believe in providing robust financial infrastructure that positively impacts society and transforms lives.
    
    In this release, we provide RESTful endpoints for accessing M-Pesa services, including STK Push (Lipa Na M-Pesa). Our APIs use standard HTTP verbs (GET and POST) with JSON-encoded parameters and responses. You can invoke our endpoints using REST clients like Postman or command-line tools like Curl and Node.js.

    ### Terminologies
    * **M-PESA**: A mobile money transfer service in Kenya for storing and transferring money via mobile phones.
    * **Xeco Sentinel**: Our advanced security layer that handles Request Integrity and Replay Protection.
    * **Short Code**: A unique number for receiving customer payments (Pay Bill, Buy Goods, or Till Number).
    * **Callback URL**: The "Webhook" on your server where XecoFlow sends final payment results.

    ### 🛡️ Request Integrity (Fixing Signature Errors)
    To prevent the **"Invalid signature"** error, all requests must be signed using **HMAC-SHA256**.
    
    1. **Secret Key**: Use your private `Xeco-Secret-Key`.
    2. **Payload**: Use the raw stringified JSON body of your request.
    3. **Header**: Pass the result in the `X-Xeco-Signature` header.

    ```javascript
    const crypto = require('crypto');
    const signature = crypto
      .createHmac('sha256', XECO_SECRET)
      .update(JSON.stringify(payload))
      .digest('hex');
    ```

    ### IP Whitelisting
    Ensure your server accepts traffic from these gateway IPs:
    * `196.201.214.200`
    * `196.201.214.206`
