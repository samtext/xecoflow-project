    Learn how to set up and integrate XecoFlow APIs into your application and start accepting M-Pesa payments today.

    ---

    ### Introduction
    Welcome to XecoFlow APIs. We believe in investing in the future and creating technologies that positively impact society.
    
    In this release, we provide API endpoints for accessing M-Pesa services, including STK Push and Transaction Status. Our APIs are RESTful, using standard HTTP verbs (GET and POST) with JSON-encoded parameters.

    ### Terminologies
    * **M-PESA**: A mobile money transfer service in Kenya for storing and transferring money via mobile phones.
    * **Xeco Sentinel**: The security gateway handling HMAC signatures and request integrity.
    * **Short Code**: A unique number for receiving customer payments.
        * **Pay Bill**: Collects money regularly from customers.
    * **Command IDs**: Unique commands specifying transaction types.
        * **Business Payment**: Sends money to registered M-Pesa customers.

    ### 🛡️ Request Integrity (HMAC-SHA256)
    To resolve `Invalid signature` errors, the request body must be signed with your **Secret Key**.

    ```javascript
    const crypto = require('crypto');
    const secret = 'YOUR_XECO_SECRET_KEY';
    const payload = { amount: "10", phoneNumber: "254..." };

    const signature = crypto
      .createHmac('sha256', secret)
      .update(JSON.stringify(payload))
      .digest('hex');
    ```

    ### IP Whitelisting
    Allow traffic from these gateways on your server:
    * `196.201.214.200`
    * `196.201.214.206`
